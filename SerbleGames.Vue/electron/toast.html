<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 360px;
      height: 480px;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      /* Toasts stack upward from the bottom-right */
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 10px;
      padding: 0 0 10px;
      -webkit-app-region: no-drag;
      user-select: none;
    }

    /* ── Individual toast ───────────────────────────────────────────────── */
    .toast {
      width: 340px;
      align-self: flex-end;
      border-radius: 12px;
      overflow: hidden;
      background: #1a1625;
      border: 1px solid #2d2545;
      box-shadow: 0 8px 32px rgba(0,0,0,0.75), 0 0 0 1px rgba(255,255,255,0.04);
      animation: toast-in 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .toast.exiting {
      animation: toast-out 0.3s ease-in both;
    }

    /* height-collapse plays after toast-out so the stack shifts smoothly */
    .toast.collapsing {
      animation: none;
      overflow: hidden;
      transition: height 0.18s ease, margin 0.18s ease, opacity 0.18s ease;
      opacity: 0;
    }

    @keyframes toast-in {
      from { transform: translateX(110%); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    @keyframes toast-out {
      from { transform: translateX(0);    opacity: 1; }
      to   { transform: translateX(110%); opacity: 0; }
    }

    /* ── Header bar ─────────────────────────────────────────────────────── */
    .toast-header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 12px;
      background: rgba(251, 191, 36, 0.08);
      border-bottom: 1px solid rgba(251, 191, 36, 0.15);
    }

    .trophy-icon {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }

    .toast-header-label {
      font-size: 10px;
      font-weight: 700;
      color: #fde68a;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    /* ── Body ───────────────────────────────────────────────────────────── */
    .toast-body {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px 12px;
    }

    .achievement-icon {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      border: 1px solid #2d2545;
      background: #0f0d1a;
      flex-shrink: 0;
      overflow: hidden;
    }

    .achievement-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .toast-text {
      min-width: 0;
      flex: 1;
    }

    .toast-title {
      font-size: 13px;
      font-weight: 700;
      color: #f0ecff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .toast-description {
      font-size: 11px;
      color: #887fa8;
      margin-top: 3px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Progress bar ───────────────────────────────────────────────────── */
    .toast-progress {
      height: 2px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
    }

    .toast-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #d97706, #fbbf24);
      animation: deplete var(--dur, 5000ms) linear forwards;
    }

    @keyframes deplete {
      from { width: 100%; }
      to   { width: 0%;   }
    }
  </style>
</head>
<body>
<script>
  const LIFETIME_MS = 5000;
  const FALLBACK = 'https://placehold.co/52x52/0f0d1a/554d6b/png';

  function esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function dismiss(el) {
    el.classList.add('exiting');
    el.addEventListener('animationend', () => {
      const h = el.offsetHeight;
      el.style.height  = h + 'px';
      el.style.opacity = '0';
      el.classList.add('collapsing');
      // Force reflow so the transition fires
      el.getBoundingClientRect();
      el.style.height = '0';
      el.style.marginBottom = '0';
      el.addEventListener('transitionend', () => {
        el.remove();
        if (document.querySelectorAll('.toast').length === 0) {
          window.toastBridge.hide();
        }
      }, { once: true });
    }, { once: true });
  }

  function addToast(data) {
    const { achievementId, achievementTitle, achievementDescription, iconUrl } = data;

    const el = document.createElement('div');
    el.className = 'toast';
    el.innerHTML = `
      <div class="toast-header">
        <svg class="trophy-icon" viewBox="0 0 24 24" fill="none"
             stroke="#fbbf24" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
          <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
          <path d="M4 22h16"/>
          <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
          <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
          <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
        </svg>
        <span class="toast-header-label">Achievement Unlocked</span>
      </div>
      <div class="toast-body">
        <div class="achievement-icon">
          <img src="${esc(iconUrl || FALLBACK)}"
               onerror="this.src='${FALLBACK}'" alt="" />
        </div>
        <div class="toast-text">
          <div class="toast-title">${esc(achievementTitle || achievementId)}</div>
          ${achievementDescription
            ? `<div class="toast-description">${esc(achievementDescription)}</div>`
            : ''}
        </div>
      </div>
      <div class="toast-progress">
        <div class="toast-progress-fill" style="--dur:${LIFETIME_MS}ms"></div>
      </div>`;

    document.body.appendChild(el);
    window.toastBridge.show();

    setTimeout(() => dismiss(el), LIFETIME_MS);
  }

  window.toastBridge.onAddToast(addToast);
</script>
</body>
</html>
